services:
  backend-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: dev
    container_name: zstar-backend-dev
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  frontend-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
    container_name: zstar-frontend-dev
    environment:
      VITE_BACKEND_PROXY_TARGET: http://backend-dev:8000
    ports:
      - "3000:3000"
    command: >
      sh -c "if [ ! -d /app/webui/node_modules ] || [ ! -f /app/webui/node_modules/.zstar_lock ] || ! cmp -s /app/webui/package-lock.json /app/webui/node_modules/.zstar_lock; then npm ci && cp /app/webui/package-lock.json /app/webui/node_modules/.zstar_lock; fi; npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - .:/app
      - /app/webui/node_modules

  backend-prd:
    profiles: ["prd"]
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: prd
    container_name: zstar-backend-prd
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"

  frontend-prd:
    profiles: ["prd"]
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: prd
    container_name: zstar-frontend-prd
    ports:
      - "3000:80"

  backtest-cli:
    profiles: ["cli"]
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: prd
    container_name: zstar-backtest-cli
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /app
    entrypoint: ["python", "-m", "zstar.cli"]
    volumes:
      - .:/app
