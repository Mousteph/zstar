services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: zstar-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: zstar-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
