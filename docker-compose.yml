services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: zstar-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./strategies:/app/strategies
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: zstar-frontend
    depends_on:
      - backend
    environment:
      BACKEND_PROXY_URL: http://backend:8000
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 3000
    ports:
      - "3000:3000"
